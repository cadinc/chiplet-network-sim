[Network]
topology = DragonflyChipletFC
k_node = 3
routing_algorithm = MIN
internal_bandwidth = 1
external_latency = 8
mis_routing = false
buffer_size = 32
vc_number = 3

[Workload]
traffic = uniform
traffic_scale = 0
packet_length = 4

[Simulation]
injection_increment = 0.01
simulation_time = 10000
timeout_threshold = 500
timeout_limit = 100
threads = 2

[Files]
output_file = ../../output/output_fc_k3_uniform.csv
log_file = ../../output/log_fc_k3.txt